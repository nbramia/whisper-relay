<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1419" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>LifeOS · Whisper Relay</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body data-phase="idle">
  <main class="app">
    <header class="topbar">
      <button id="btn-chats" type="button" class="btn-ghost" title="Conversations">
        Chats
      </button>
      <div class="topbar-title">
        <h1>LifeOS</h1>
        <p class="subtitle">Whisper Relay</p>
      </div>
      <button id="btn-new-chat" type="button" class="btn-ghost" title="New conversation">
        New chat
      </button>
    </header>

    <div id="conv-overlay" class="conv-overlay hidden" aria-hidden="true"></div>
    <aside id="conv-sidebar" class="conv-sidebar hidden" aria-label="Conversations">
      <div class="conv-sidebar-header">
        <h2>Conversations</h2>
        <button id="btn-close-sidebar" type="button" class="btn-ghost">Close</button>
      </div>
      <ul id="conv-list" class="conv-list"></ul>
    </aside>

    <section id="thread" class="thread" aria-live="polite">
      <p id="thread-empty" class="thread-empty">Tap the button below to start talking.</p>
    </section>

    <div id="status-banner" class="status-banner hidden" role="status">
      <span id="status-text" class="status-text"></span>
      <span id="timer" class="timer hidden">0:00</span>
    </div>

    <footer class="dock">
      <p id="hint" class="hint">Tap to talk</p>

      <div class="shutter-wrap">
        <div id="pulse-ring" class="pulse-ring hidden" aria-hidden="true"></div>
        <button id="btn-talk" type="button" class="shutter" aria-label="Tap to talk">
          <span class="shutter-inner" aria-hidden="true"></span>
        </button>
      </div>

      <div class="dock-footer">
        <button id="btn-stop" type="button" class="btn-ghost btn-stop hidden" title="Stop playback">
          Stop
        </button>
        <label class="toggle-auto" for="auto-continue">
          <input type="checkbox" id="auto-continue" />
          <span class="toggle-track" aria-hidden="true"></span>
          <span class="toggle-label">Auto</span>
        </label>
      </div>
    </footer>

    <p id="error" class="error hidden" role="alert"></p>
  </main>
  <script src="/app.js?v=24"></script>
</body>
</html>
